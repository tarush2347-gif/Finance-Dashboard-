<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elite Finance Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>💎 Elite Finance Dashboard</h1>

<div class="top-section">
  <div class="summary income">Income ₹<span id="income">0</span></div>
  <div class="summary expense">Expense ₹<span id="expense">0</span></div>
  <div class="summary balance">Balance ₹<span id="balance">0</span></div>
</div>

<div class="container">

  <div class="card">
    <h2>Add Transaction</h2>
    <input type="text" id="desc" placeholder="Description">
    <input type="number" id="amount" placeholder="Amount">

    <label class="switch">
      <input type="checkbox" id="toggleType">
      <span class="slider"></span>
    </label>
    <p id="typeLabel">Income</p>

    <button onclick="addTransaction()">Add</button>
  </div>

  <div class="card">
    <h2>Transactions</h2>
    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th>Amount</th>
          <th>Type</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Analytics</h2>
    <canvas id="chart"></canvas>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
